name: build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  check-toolchain-sync:
    name: Check toolchain sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/check-toolchain-sync.sh

  build:
    name: Build linux/${{ matrix.arch }}
    needs: check-toolchain-sync
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: backend/go.sum

      - name: Build frontend
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Build backend
        working-directory: backend
        env:
          CGO_ENABLED: 0
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
        run: |
          go build -trimpath -ldflags="-s -w" -o "opsagent-linux-${{ matrix.arch }}" .

      - uses: actions/upload-artifact@v4
        with:
          name: opsagent-linux-${{ matrix.arch }}
          path: backend/opsagent-linux-${{ matrix.arch }}
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum opsagent-linux-* > sha256sums.txt

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            dist/opsagent-linux-amd64
            dist/opsagent-linux-arm64
            dist/sha256sums.txt
          fail_on_unmatched_files: true
          generate_release_notes: true
